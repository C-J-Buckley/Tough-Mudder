<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tough Mudder Operator Overlay</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        --pixel-unit: 32px;
        background: #6aa6d8;
        color: #fff6e8;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 12% 8%, rgba(255, 235, 134, .32), transparent 28%),
          radial-gradient(circle at 86% 16%, rgba(255, 255, 255, .16), transparent 28%),
          linear-gradient(135deg, #79b9e6, #2f7a61 62%, #7b5a2d);
      }

      .stage {
        position: relative;
        width: min(100vw - 48px, calc((100vh - 48px) * 16 / 9));
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border: 1px solid rgba(255, 230, 168, .38);
        border-radius: 6px;
        background: #7ec6ee url("tough-mudder-32bit-background.svg") center / cover no-repeat;
        box-shadow:
          0 0 0 4px rgba(61, 36, 19, .88),
          0 26px 80px rgba(45, 27, 15, .36),
          inset 0 0 0 1px rgba(255, 255, 255, .18);
        image-rendering: auto;
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(circle at 18% 13%, rgba(255, 249, 184, .34), transparent 23%),
          linear-gradient(90deg, rgba(61, 36, 19, .18), rgba(61, 36, 19, .02) 42%, rgba(61, 36, 19, .20)),
          linear-gradient(180deg, rgba(255, 255, 255, .14), rgba(255, 255, 255, .02) 48%, rgba(67, 37, 18, .22));
        pointer-events: none;
      }

      .stage::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 2;
        background:
          linear-gradient(90deg, rgba(255,255,255,.055) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255,255,255,.045) 1px, transparent 1px),
          radial-gradient(circle at 50% 58%, transparent 45%, rgba(51, 29, 15, .18));
        background-size: 8px 8px, 8px 8px, auto;
        mix-blend-mode: soft-light;
        pointer-events: none;
      }

      .hud {
        position: relative;
        z-index: 4;
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
        align-items: start;
        max-width: 38%;
        padding: 12px 24px 0;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: #e7a547;
        font-size: clamp(8px, .85vw, 11px);
        font-weight: 900;
        letter-spacing: .12em;
        text-transform: uppercase;
        text-shadow: 1px 1px 0 #24150b;
      }

      h1 {
        margin: 0;
        max-width: 780px;
        color: #fff6e8;
        font-size: clamp(9px, 1.225vw, 17px);
        line-height: .95;
        font-weight: 950;
        letter-spacing: .02em;
        text-transform: uppercase;
        text-shadow:
          1px 0 0 #2a160c,
          -1px 0 0 #2a160c,
          0 1px 0 #2a160c,
          0 -1px 0 #2a160c,
          1px 1px 0 #2a160c;
      }

      .leaderboard {
        position: absolute;
        z-index: 540;
        right: 12px;
        top: 12px;
        width: min(780px, 74vw);
        border: 1px solid rgba(255, 212, 118, .62);
        border-radius: 5px;
        padding: 7px 8px 8px;
        color: #fff2c9;
        background:
          linear-gradient(180deg, rgba(83, 49, 24, .92), rgba(31, 17, 9, .9));
        box-shadow:
          0 4px 0 rgba(18, 9, 5, .86),
          0 8px 14px rgba(18, 9, 5, .28),
          inset 0 1px 0 rgba(255, 245, 196, .34);
        text-align: left;
        text-transform: uppercase;
      }

      .leaderboard-title {
        margin-bottom: 5px;
        color: #ffd476;
        font-size: clamp(9px, .82vw, 12px);
        font-weight: 950;
        letter-spacing: .1em;
      }

      .leaderboard-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .leaderboard-column {
        min-width: 0;
      }

      .leaderboard-column + .leaderboard-column {
        border-left: 1px solid rgba(255, 212, 118, .38);
        padding-left: 6px;
      }

      .leaderboard-heading,
      .leaderboard-row {
        display: grid;
        grid-template-columns: 32px 34px 30px 24px 38px 38px;
        gap: 3px;
        align-items: center;
      }

      .leaderboard-heading span,
      .leaderboard-row span {
        display: block;
        min-width: 0;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .leaderboard-heading span:not(:first-child) {
        text-align: right;
      }

      .leaderboard-heading {
        margin-bottom: 3px;
        color: #ffbd52;
        font-size: clamp(7px, .6vw, 9px);
        font-weight: 950;
        line-height: 1;
        letter-spacing: .05em;
        text-shadow: 1px 1px 0 #120905;
      }

      .leaderboard-column-list {
        display: grid;
        gap: 1px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .leaderboard-row {
        min-height: 10px;
        color: #fff8de;
        font-size: clamp(7px, .7vw, 10px);
        font-weight: 950;
        line-height: 1;
        text-shadow: 1px 1px 0 #120905;
      }

      .leaderboard-place {
        color: #ffbd52;
      }

      .leaderboard-locker {
        color: #fff8de;
      }

      .leaderboard-hours,
      .leaderboard-sessions,
      .leaderboard-away,
      .leaderboard-setup {
        color: #9df4ff;
      }

      .leaderboard-place,
      .leaderboard-hours,
      .leaderboard-sessions {
        text-align: right;
      }

      .leaderboard-percent {
        position: relative;
        display: block;
        height: 9px;
        overflow: hidden;
        border: 1px solid rgba(255, 247, 214, .28);
        border-radius: 2px;
        background: rgba(9, 12, 12, .82);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, .12);
      }

      .leaderboard-percent::before {
        content: "";
        position: absolute;
        inset: 0;
        width: var(--percent);
        background: var(--metric-color);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, .38);
      }

      .leaderboard-percent span {
        position: relative;
        z-index: 1;
        display: block;
        color: #fffdf0;
        font-size: 6px;
        font-weight: 950;
        line-height: 9px;
        text-align: center;
        text-shadow: 1px 1px 0 #07100f;
      }

      .leaderboard-away {
        --metric-color: #23e5ff;
      }

      .leaderboard-setup {
        --metric-color: #13c7a2;
      }

      .podium {
        margin-top: 26px;
        width: 178px;
        color: #fff2c9;
        text-transform: uppercase;
        image-rendering: pixelated;
      }

      .podium[hidden] {
        display: none;
      }

      .podium-title {
        position: relative;
        display: inline-block;
        margin: 0 0 5px 18px;
        border: 1px solid rgba(255, 232, 154, .78);
        padding: 3px 12px 2px;
        color: #2a160c;
        background:
          linear-gradient(180deg, #ffe17c, #d98d24);
        box-shadow:
          2px 2px 0 #120905,
          inset 0 1px 0 rgba(255, 248, 199, .65);
        font-size: clamp(7px, .64vw, 9px);
        font-weight: 950;
        letter-spacing: .1em;
        text-shadow: 1px 1px 0 rgba(255, 245, 188, .6);
      }

      .podium-title::before,
      .podium-title::after {
        content: "";
        position: absolute;
        top: 3px;
        width: 7px;
        height: 11px;
        background: #b95f19;
        box-shadow: inset 0 1px 0 rgba(255, 232, 154, .36);
      }

      .podium-title::before {
        left: -8px;
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0 70%);
      }

      .podium-title::after {
        right: -8px;
        clip-path: polygon(0 0, 100% 0, 100% 70%, 0 100%);
      }

      .podium-stands {
        position: relative;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        align-items: end;
        gap: 6px;
        min-height: 84px;
      }

      .podium-stands::before {
        content: "";
        position: absolute;
        left: 5px;
        right: 5px;
        top: -13px;
        height: 42px;
        z-index: 4;
        background:
          radial-gradient(circle, #ff3150 0 2px, transparent 3px) 10px 18px / 38px 24px,
          radial-gradient(circle, #ffe140 0 2px, transparent 3px) 26px 6px / 44px 28px,
          radial-gradient(circle, #16a9ff 0 2px, transparent 3px) 78px 14px / 42px 25px,
          radial-gradient(circle, #39e75f 0 2px, transparent 3px) 115px 5px / 36px 24px,
          linear-gradient(#ff8a1f 0 0) 18px 4px / 4px 4px no-repeat,
          linear-gradient(#7b5cff 0 0) 52px 16px / 4px 4px no-repeat,
          linear-gradient(#ff3150 0 0) 95px 2px / 4px 4px no-repeat,
          linear-gradient(#ffe140 0 0) 139px 18px / 4px 4px no-repeat;
        background-repeat: no-repeat;
        pointer-events: none;
        animation: podium-confetti-float 1.8s steps(1, end) infinite;
      }

      .podium-stand {
        position: relative;
        display: grid;
        justify-items: center;
        align-items: end;
        min-width: 0;
      }

      .podium-runner {
        position: absolute;
        bottom: var(--block-height);
        width: 30px;
        height: 30px;
        background: var(--idle-sheet) 0 0 / 60px 30px no-repeat;
        filter: drop-shadow(1px 2px 0 rgba(24, 13, 7, .72));
      }

      .podium-number {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(calc(-50% + 1px), -50%);
        color: #fff8cf;
        font-size: 5px;
        font-weight: 950;
        line-height: 1;
        text-shadow:
          1px 0 0 #120905,
          -1px 0 0 #120905,
          0 1px 0 #120905,
          0 -1px 0 #120905;
      }

      .podium-block {
        position: relative;
        display: grid;
        align-content: center;
        justify-items: center;
        width: 100%;
        height: var(--block-height);
        border: 1px solid rgba(255, 232, 154, .72);
        background:
          linear-gradient(180deg, rgba(255, 212, 118, .96), rgba(177, 106, 34, .96) 58%, rgba(88, 48, 19, .96)),
          repeating-linear-gradient(90deg, rgba(255,255,255,.16) 0 6px, transparent 6px 14px);
        box-shadow:
          0 4px 0 rgba(18, 9, 5, .85),
          inset 0 1px 0 rgba(255, 248, 199, .55);
      }

      .podium-medal {
        color: #2a160c;
        font-size: clamp(9px, .82vw, 12px);
        font-weight: 950;
        line-height: 1;
        text-shadow: 1px 1px 0 rgba(255, 239, 166, .48);
      }

      .podium-locker {
        margin-top: 3px;
        color: #fff8cf;
        font-size: clamp(6px, .62vw, 8px);
        font-weight: 950;
        line-height: 1;
        text-shadow: 1px 1px 0 #120905;
      }

      .course {
        position: absolute;
        inset: 88px 8px 4px;
        z-index: 3;
      }

      .course::before,
      .course::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .stage[data-scene="scene-1"] .course::before {
        left: 0;
        right: 0;
        top: 36%;
        bottom: 0;
        z-index: 3;
        background:
          radial-gradient(circle, rgba(50, 28, 14, .34) 0 2px, transparent 3px) 0 0 / 28px 20px,
          radial-gradient(circle, rgba(166, 112, 48, .32) 0 1px, transparent 2px) 12px 9px / 22px 18px,
          repeating-linear-gradient(90deg, rgba(255, 226, 141, .10) 0 4px, transparent 4px 22px),
          radial-gradient(ellipse at 10% 78%, rgba(70, 43, 22, .32), transparent 20%),
          radial-gradient(ellipse at 92% 76%, rgba(70, 43, 22, .25), transparent 18%);
        mix-blend-mode: multiply;
      }

      .stage[data-scene="scene-1"] .course::after {
        left: 1.4%;
        top: 36%;
        width: 9%;
        height: 64%;
        z-index: 4;
        border-left: 5px solid rgba(115, 74, 36, .88);
        border-right: 5px solid rgba(115, 74, 36, .88);
        background:
          radial-gradient(circle, rgba(50, 28, 14, .42) 0 3px, transparent 4px) 4px 4px / 24px 22px,
          repeating-linear-gradient(180deg, rgba(142, 91, 43, .78) 0 10px, rgba(74, 43, 23, .76) 10px 20px),
          linear-gradient(90deg, rgba(37, 22, 12, .36), transparent 28%, transparent 72%, rgba(37, 22, 12, .36));
        box-shadow: 4px 4px 0 rgba(17, 10, 6, .72);
      }

      .stage[data-scene="scene-2"] .course::before,
      .stage[data-scene="scene-3"] .course::before,
      .stage[data-scene="scene-4"] .course::before {
        left: 0;
        right: 0;
        top: 36%;
        bottom: 0;
        z-index: 3;
        mix-blend-mode: multiply;
      }

      .stage[data-scene="scene-2"] .course::before {
        background:
          radial-gradient(circle, rgba(216, 255, 255, .36) 0 2px, transparent 3px) 0 0 / 30px 22px,
          repeating-linear-gradient(135deg, rgba(122, 218, 235, .20) 0 10px, transparent 10px 28px),
          linear-gradient(180deg, rgba(42, 145, 174, .28), rgba(18, 74, 94, .34));
      }

      .stage[data-scene="scene-3"] .course::before {
        background:
          radial-gradient(circle, rgba(255, 255, 255, .62) 0 2px, transparent 3px) 0 0 / 26px 22px,
          repeating-linear-gradient(135deg, rgba(255, 255, 255, .28) 0 8px, transparent 8px 24px),
          linear-gradient(180deg, rgba(205, 246, 255, .32), rgba(76, 149, 176, .36));
      }

      .stage[data-scene="scene-4"] .course::before {
        background:
          radial-gradient(circle, rgba(255, 200, 64, .34) 0 2px, transparent 3px) 0 0 / 30px 20px,
          radial-gradient(circle, rgba(185, 57, 24, .28) 0 3px, transparent 4px) 13px 8px / 34px 24px,
          linear-gradient(180deg, rgba(139, 48, 18, .28), rgba(74, 24, 13, .38));
      }

      .route {
        position: absolute;
        inset: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .route-shadow,
      .route-main,
      .lane-marker {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .route-shadow {
        stroke: rgba(28, 15, 8, .64);
        stroke-width: 288;
        filter: drop-shadow(0 13px 8px rgba(26, 13, 7, .42));
      }

      .route-main {
        stroke: var(--route-main, rgba(91, 53, 28, .92));
        stroke-width: 270;
        filter:
          drop-shadow(0 4px 0 rgba(48, 27, 15, .42))
          drop-shadow(0 -3px 0 rgba(255, 226, 149, .16));
      }

      .lane-marker {
        stroke: rgba(255, 223, 139, .24);
        stroke-width: 1.8;
        vector-effect: non-scaling-stroke;
      }

      .lane-marker.major {
        stroke: rgba(255, 240, 181, .36);
        stroke-width: 2.4;
      }

      .course-badge {
        display: inline-block;
        margin-top: 4px;
        border: 1px solid rgba(255, 212, 118, .58);
        padding: 2px 5px;
        color: #ffd476;
        background: rgba(21, 12, 8, .78);
        box-shadow: 2px 2px 0 #0b0705;
        font-size: clamp(8px, .72vw, 10px);
        font-weight: 950;
        letter-spacing: .08em;
        text-transform: uppercase;
      }

      .checkpoint {
        position: absolute;
        z-index: 500;
        min-width: 64px;
        transform: translateY(-10px);
        border: 1px solid rgba(255, 235, 169, .78);
        border-radius: 5px;
        padding: 6px 8px 5px;
        color: #fff2c9;
        background:
          linear-gradient(180deg, rgba(124, 80, 40, .94), rgba(55, 31, 17, .94));
        box-shadow:
          0 4px 0 rgba(18, 9, 5, .9),
          0 8px 14px rgba(18, 9, 5, .34),
          inset 0 1px 0 rgba(255, 245, 196, .42);
        font-size: clamp(10px, 1vw, 14px);
        font-weight: 950;
        line-height: 1;
        text-align: center;
        text-transform: uppercase;
      }

      .course-obstacle {
        position: absolute;
        z-index: 5;
        overflow: hidden;
        border: 1px solid rgba(255, 230, 168, .2);
        border-radius: 5px;
        box-shadow:
          0 8px 0 rgba(31, 17, 9, .76),
          0 16px 22px rgba(31, 17, 9, .32),
          inset 0 1px 0 rgba(255, 241, 198, .26);
        image-rendering: pixelated;
        transform-origin: center bottom;
      }

      .course-obstacle::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 245, 191, .28), transparent 38%),
          linear-gradient(90deg, rgba(255,255,255,.08), transparent 38%, rgba(0,0,0,.16));
        pointer-events: none;
      }

      .course-obstacle::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 30%;
        background: rgba(20, 10, 5, .18);
        pointer-events: none;
      }

      #operator-layer {
        position: absolute;
        inset: 0;
        z-index: 440;
        pointer-events: none;
      }

      .operator-sprite {
        position: absolute;
        z-index: var(--z);
        left: var(--x);
        top: var(--y);
        width: var(--sprite-size);
        height: var(--sprite-size);
        transform: translate(-50%, -70%) translate(var(--jitter-x), var(--jitter-y));
        image-rendering: pixelated;
      }

      .operator-runner {
        position: absolute;
        z-index: 1;
        inset: 0;
        background: var(--runner-sheet, url("tough-mudder-operator-running.png?v=1")) 0 0 / 72px 36px no-repeat;
        background-position: 0 0;
        filter: drop-shadow(1px 2px 0 rgba(24, 13, 7, .72));
        animation: operator-run-frames .36s infinite;
      }

      .operator-sprite.is-idle .operator-runner {
        background: var(--idle-sheet, url("tough-mudder-operator-idle.png?v=1")) 0 0 / 72px 36px no-repeat;
        background-position: 0 0;
        animation: none;
      }

      .operator-number {
        position: absolute;
        z-index: 2;
        left: 50%;
        right: auto;
        top: 50%;
        min-width: 0;
        padding: 0;
        transform: translate(calc(-50% + 1px), -50%) rotate(var(--label-tilt));
        color: #fff8cf;
        background: transparent;
        box-shadow: none;
        font-size: clamp(4px, .48vw, 6px);
        font-weight: 950;
        line-height: 1;
        text-align: center;
        text-shadow:
          1px 0 0 #120905,
          -1px 0 0 #120905,
          0 1px 0 #120905,
          0 -1px 0 #120905;
      }

      .tire-field {
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: visible;
        background: transparent;
      }

      .tire-field::before,
      .tire-field::after {
        content: none;
      }

      .tire-pixel {
        position: absolute;
        z-index: 4;
        left: var(--x);
        top: var(--y);
        width: var(--size);
        height: var(--size);
        transform: translate(-50%, -50%);
        background:
          radial-gradient(circle, transparent 0 28%, #0d0a09 30% 49%, #3a3029 51% 63%, transparent 65%),
          radial-gradient(circle at 62% 34%, rgba(255, 243, 202, .34) 0 7%, transparent 9%);
        image-rendering: pixelated;
        pointer-events: none;
      }

      .mud-start {
        top: 29% !important;
        height: 71% !important;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: visible;
        background: transparent;
      }

      .mud-start::before {
        content: none;
      }

      .mud-start::after {
        content: none;
      }

      .mud-start .mud-bubble-pixel {
        opacity: .18;
        transform: translate(-50%, -50%) scale(.38);
      }

      .mud-splash-pixel {
        position: absolute;
        z-index: 7;
        left: var(--x);
        top: var(--y);
        width: var(--w);
        height: var(--h);
        transform: translate(-50%, -50%) rotate(var(--r));
        background: url("tough-mudder-pixel-mud-blob.svg?v=1") center / contain no-repeat;
        image-rendering: pixelated;
        pointer-events: none;
      }

      .mud-footprint-pixel {
        position: absolute;
        z-index: 9;
        left: var(--x);
        top: var(--y);
        width: var(--w);
        height: var(--h);
        transform: translate(-50%, -50%) rotate(var(--r));
        background: url("tough-mudder-pixel-footprint.svg?v=1") center / contain no-repeat;
        filter: drop-shadow(1px 2px 0 rgba(28, 14, 8, .52));
        image-rendering: pixelated;
        pointer-events: none;
      }

      .crawl-pit {
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
        background:
          url("tough-mudder-pixel-mud-ripple.svg") 0 6px / 48px 32px repeat,
          url("tough-mudder-pixel-mud-ripple.svg") 20px 24px / 56px 38px repeat,
          linear-gradient(180deg, #8a552d 0 25%, #6a3b20 25% 68%, #3f2315 68% 100%);
        animation: muddy-water-current 7.4s steps(7, end) infinite;
      }

      .crawl-pit::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          url("tough-mudder-pixel-mud-ripple.svg") 8px 12px / 58px 38px repeat,
          url("tough-mudder-pixel-mud-ripple.svg") -10px 30px / 44px 30px repeat;
        opacity: .46;
        animation: muddy-water-ripple 4.8s steps(4, end) infinite;
        pointer-events: none;
      }

      .crawl-pit::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 24%, rgba(40, 22, 13, .48) 0 6px, transparent 7px),
          radial-gradient(circle at 74% 44%, rgba(111, 64, 31, .58) 0 7px, transparent 8px),
          radial-gradient(circle at 42% 78%, rgba(37, 20, 12, .52) 0 8px, transparent 9px);
        opacity: .54;
        pointer-events: none;
      }

      .mud-bubble-pixel {
        position: absolute;
        z-index: 8;
        left: var(--x);
        top: var(--y);
        width: var(--size);
        height: var(--size);
        transform: translate(-50%, -50%) scale(.5);
        opacity: .24;

      function laneHtml(route, laneIndex) {
        const offset = -TRACK_WIDTH / 2 + (laneIndex * TRACK_WIDTH) / LANE_COUNT;
        const points = route
          .trim()
          .split(/\s+/)
          .map(point => {
            const [x, y] = point.split(",").map(Number);
            return `${x},${Math.round(y + offset)}`;

          .join(" ");
        const major = laneIndex % 3 === 0 ? " major" : "";
        return `<polyline class="lane-marker${major}" points="${points}"/>`;
      }

      function parseRoute(route) {
        return route
          .trim()
          .split(/\s+/)
          .map(point => {
            const [x, y] = point.split(",").map(Number);
            return { x, y };
          });
      }

      function pointAtProgress(routePoints, progress) {
        const segments = routePoints.slice(1).map((point, index) => {
          const previous = routePoints[index];
          const dx = point.x - previous.x;
          const dy = point.y - previous.y;
          return {
            from: previous,
            to: point,
            length: Math.hypot(dx, dy)
          };
        });
        const totalLength = segments.reduce((sum, segment) => sum + segment.length, 0);
        let distance = totalLength * Math.max(0, Math.min(1, progress));

        for (const segment of segments) {
          if (distance <= segment.length) {
            const ratio = segment.length ? distance / segment.length : 0;
            return {
              x: segment.from.x + (segment.to.x - segment.from.x) * ratio,
              y: segment.from.y + (segment.to.y - segment.from.y) * ratio
            };
          }
          distance -= segment.length;
        }

        return routePoints[routePoints.length - 1];
      }

      function laneCenterOffset(laneIndex) {
        return -TRACK_WIDTH / 2 + ((laneIndex + .5) * TRACK_WIDTH) / LANE_COUNT;
      }

      function normalizeProgress(value) {
        if (value === null || value === undefined || value === "") return null;
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) return null;
        const percent = numeric > 1 ? numeric / 100 : numeric;
        return Math.max(0, Math.min(1, percent));
      }

      function normalizePercent(value) {
        if (value === null || value === undefined || value === "") return null;
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) return null;
        const percent = numeric <= 1 ? numeric * 100 : numeric;
        return Math.max(0, Math.min(100, percent));
      }

      function numericMetric(value) {
        if (value === null || value === undefined || value === "") return null;
        const numeric = Number(value);
        return Number.isFinite(numeric) ? numeric : null;
      }

      function externalOperatorValueFor(lockerNumber, index) {
        const sources = [
          window.TOUGH_MUDDER_OPERATOR_PROGRESS,
          window.OPERATOR_PROGRESS,
          window.operatorProgress
        ];

        for (const source of sources) {
          if (!source) continue;
          const value = source[lockerNumber] ?? source[String(lockerNumber)] ?? source[index];
          if (value !== null && value !== undefined) return value;
        }

        return null;
      }

      function externalProgressFor(lockerNumber, index) {
        const value = externalOperatorValueFor(lockerNumber, index);
        if (value !== null) {
          const progress = normalizeProgress(value?.progress ?? value);
          if (progress !== null) return progress;
        }

        const params = new URLSearchParams(location.search);
        const lockerProgress = params.get(`locker${lockerNumber}`) ?? params.get(`p${lockerNumber}`);
        const requestedProgress = normalizeProgress(lockerProgress ?? params.get("progress"));
        if (requestedProgress !== null) return requestedProgress;

        return null;
      }

      function externalHoursFor(lockerNumber, index) {
        const value = externalOperatorValueFor(lockerNumber, index);
        const hours = numericMetric(value?.hours ?? value?.totalHours ?? value?.workedHours ?? value?.durationHours);
        if (hours !== null) return hours;

        const params = new URLSearchParams(location.search);
        return numericMetric(params.get(`hours${lockerNumber}`) ?? params.get(`h${lockerNumber}`));
      }

      function externalSessionsFor(lockerNumber, index) {
        const value = externalOperatorValueFor(lockerNumber, index);
        const sessions = numericMetric(value?.sessions ?? value?.sessionCount ?? value?.totalSessions);
        if (sessions !== null) return sessions;

        const params = new URLSearchParams(location.search);
        return numericMetric(params.get(`sessions${lockerNumber}`) ?? params.get(`s${lockerNumber}`));
      }

      function externalAwayFor(lockerNumber, index) {
        const value = externalOperatorValueFor(lockerNumber, index);
        const away = normalizePercent(value?.away ?? value?.awayPercent ?? value?.awayPercentage ?? value?.awayTimePercent ?? value?.awayTimePercentage);
        if (away !== null) return away;

        const params = new URLSearchParams(location.search);
        return normalizePercent(params.get(`away${lockerNumber}`) ?? params.get(`a${lockerNumber}`));
      }

      function externalSetupFor(lockerNumber, index) {
        const value = externalOperatorValueFor(lockerNumber, index);
        const setup = normalizePercent(value?.setup ?? value?.setupPercent ?? value?.setupPercentage ?? value?.setupTimePercent ?? value?.setupTimePercentage);
        if (setup !== null) return setup;

        const params = new URLSearchParams(location.search);
        return normalizePercent(params.get(`setup${lockerNumber}`) ?? params.get(`st${lockerNumber}`));
      }

      function previewProgressFor(index) {
        const group = Math.floor(index / 9);
        const step = index % 9;
        return .06 + step * .034 + group * .012;
      }

      function previewAwayFor(index) {
        return 6 + (index * 7) % 35;
      }

      function previewSetupFor(index) {
        return 10 + (index * 11) % 48;
      }

      function operatorProgressEntries() {
        return ACTIVE_LOCKER_NUMBERS.map((lockerNumber, index) => ({
          lockerNumber,
          index,
          progress: externalProgressFor(lockerNumber, index) ?? previewProgressFor(index)
        }));
      }

      function formatHours(hours) {
        return hours < 10 ? hours.toFixed(1) : Math.round(hours).toString();
      }

      function formatSessions(sessions) {
        return Number.isInteger(sessions) ? String(sessions) : sessions.toFixed(1);
      }

      function formatPercent(percent) {
        return `${Math.round(percent)}%`;
      }

      function leaderboardPercentHtml(kind, percent) {
        const safePercent = Math.max(0, Math.min(100, percent));
        return `<span class="leaderboard-percent leaderboard-${kind}" style="--percent:${safePercent.toFixed(0)}%"><span>${formatPercent(safePercent)}</span></span>`;
      }

      function ordinalPlace(place) {
        const mod100 = place % 100;
        if (mod100 >= 11 && mod100 <= 13) return `${place}th`;
        const suffixes = { 1: "st", 2: "nd", 3: "rd" };
        return `${place}${suffixes[place % 10] || "th"}`;
      }

      function outfitForIndex(index) {
        return OUTFIT_COLORS[index % OUTFIT_COLORS.length];
      }

      function rankedOperatorEntries() {
        return operatorProgressEntries()
          .sort((a, b) => b.progress - a.progress || a.index - b.index)
          .map((entry, index) => ({
            ...entry,
            hours: externalHoursFor(entry.lockerNumber, entry.index) ?? entry.progress * API_CONFIG.targetHours,
            sessions: externalSessionsFor(entry.lockerNumber, entry.index) ?? Math.min(SCENES.length, Math.ceil(entry.progress * SCENES.length)),
            away: externalAwayFor(entry.lockerNumber, entry.index) ?? previewAwayFor(entry.index),
            setup: externalSetupFor(entry.lockerNumber, entry.index) ?? previewSetupFor(entry.index),
            place: index + 1,
            outfit: outfitForIndex(entry.index)
          }));
      }

      function courseFinishProgress(sceneIndex) {
        return (sceneIndex + 1) / SCENES.length;
      }

      function podiumCourseIndexForPhase(phase) {
        if (phase.kind === "pre") return null;
        if (phase.kind === "break" || phase.kind === "lunch") return Math.max(0, phase.sceneIndex - 1);
        if (phase.kind === "complete") return SCENES.length - 1;
        return phase.sceneIndex;
      }

      function courseFinishers(sceneIndex) {
        const finishLine = courseFinishProgress(sceneIndex);
        return rankedOperatorEntries().filter(entry => entry.progress >= finishLine);
      }

      function leaderboardHtml() {
        const rankedEntries = rankedOperatorEntries();
        const entries = rankedEntries.sort((a, b) => a.lockerNumber - b.lockerNumber);

        const rowsPerColumn = Math.ceil(entries.length / 3);
        return Array.from({ length: 3 }, (_, columnIndex) => {
          const rows = entries
            .slice(columnIndex * rowsPerColumn, (columnIndex + 1) * rowsPerColumn)
            .map(entry => `<li class="leaderboard-row"><span class="leaderboard-locker">#${entry.lockerNumber}</span><span class="leaderboard-place">${ordinalPlace(entry.place)}</span><span class="leaderboard-hours">${formatHours(entry.hours)}</span><span class="leaderboard-sessions">${formatSessions(entry.sessions)}</span>${leaderboardPercentHtml("away", entry.away)}${leaderboardPercentHtml("setup", entry.setup)}</li>`)
            .join("");

          return `<div class="leaderboard-column"><div class="leaderboard-heading" aria-hidden="true"><span>Lock</span><span>Place</span><span>Hrs</span><span>Ses</span><span>Away</span><span>Setup</span></div><ol class="leaderboard-column-list">${rows}</ol></div>`;
        }).join("");
      }

      function podiumHtml(sceneIndex) {
        if (sceneIndex === null) return "";

        const podiumOrder = [
          { place: 2, label: "2nd", blockHeight: 34 },
          { place: 1, label: "1st", blockHeight: 50 },
          { place: 3, label: "3rd", blockHeight: 25 }
        ];
        const topThree = courseFinishers(sceneIndex).slice(0, 3);
        if (topThree.length < 3) return "";

        return podiumOrder.map(slot => {
          const entry = topThree[slot.place - 1];
          if (!entry) return "";
          return `<div class="podium-stand podium-place-${slot.place}" data-outfit="${entry.outfit}" style="--block-height:${slot.blockHeight}px;--idle-sheet:url('tough-mudder-operator-idle-${entry.outfit}.png')"><div class="podium-runner"><span class="podium-number">${entry.lockerNumber}</span></div><div class="podium-block"><span class="podium-medal">${slot.label}</span><span class="podium-locker">#${entry.lockerNumber}</span></div></div>`;
        }).join("");
      }

      function operatorLayerHtml(scene) {
        const routePoints = parseRoute(scene.route);
        return ACTIVE_LOCKER_NUMBERS.map((lockerNumber, index) => {
          const progress = externalProgressFor(lockerNumber, index) ?? previewProgressFor(index);
          const isIdle = progress <= .015;
          const laneIndex = index % LANE_COUNT;
          const point = pointAtProgress(routePoints, progress);
          const laneY = Math.max(8, Math.min(412, point.y + laneCenterOffset(laneIndex)));
          const x = (point.x / 1000) * 100;
          const y = (laneY / 420) * 100;
          const jitterX = ((index % 3) - 1) * 2;
          const jitterY = ((index % 5) - 2) * .6;
          const labelTilt = [-3, 2, -1, 3][index % 4];
          const outfit = outfitForIndex(index);
          const z = 120 + laneIndex;
          const spriteSize = 36;
          const stateClass = isIdle ? " is-idle" : "";
          return `<div class="operator-sprite${stateClass}" data-locker-number="${lockerNumber}" data-outfit="${outfit}" data-lane="${laneIndex + 1}" data-progress="${progress.toFixed(3)}" style="--x:${x.toFixed(2)}%;--y:${y.toFixed(2)}%;--jitter-x:${jitterX}px;--jitter-y:${jitterY}px;--label-tilt:${labelTilt}deg;--runner-sheet:url('tough-mudder-operator-running-${outfit}.png');--idle-sheet:url('tough-mudder-operator-idle-${outfit}.png');--z:${z};--sprite-size:${spriteSize}px"><span class="operator-number">${lockerNumber}</span><span class="operator-runner"></span></div>`;
        }).join("");
      }

      function shiftStartFor(now) {
        const start = new Date(now);
        start.setHours(22, 30, 0, 0);
        if (now < start) start.setDate(start.getDate() - 1);
        return start;
      }

      function phaseWithTiming(phase, elapsedMinutes = null) {
        const durationMinutes = phase.end - phase.start;
        const remainingMs = elapsedMinutes === null
          ? durationMinutes * 60000
          : Math.max(0, (phase.end - elapsedMinutes) * 60000);
        return {
          ...phase,
          durationMinutes,
          remainingMs
        };
      }

      function formatCountdown(remainingMs) {
        const totalSeconds = Math.max(0, Math.ceil(remainingMs / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function phaseForNow(now = new Date()) {
        const params = new URLSearchParams(location.search);
        const courseOverride = params.get("course") || params.get("scene");
        if (courseOverride) {
          const sceneIndex = Math.max(0, Math.min(SCENES.length - 1, Number(courseOverride) - 1));
          return { kind: "scene", sceneIndex, label: "Preview override" };
        }

        const phaseOverride = params.get("phase");
        const phaseOverrides = {
          break1: SCHEDULE[1],
          lunch: SCHEDULE[3],
          break2: SCHEDULE[5]
        };
        if (phaseOverrides[phaseOverride]) {
          const overridePhase = phaseOverrides[phaseOverride];
          const elapsedInOverride = Math.min(
            overridePhase.end - overridePhase.start,
            (Date.now() - PHASE_OVERRIDE_STARTED_AT) / 60000
          );
          return phaseWithTiming(overridePhase, overridePhase.start + elapsedInOverride);
        }

        const start = shiftStartFor(now);
        const elapsed = (now - start) / 60000;
        const current = SCHEDULE.find(item => elapsed >= item.start && elapsed < item.end);
        if (current) return phaseWithTiming(current, elapsed);

        if (elapsed >= 480) {
          return { kind: "complete", sceneIndex: 3, label: "Match complete", copy: "Next workday starts 10:30 PM" };
        }

        return { kind: "pre", sceneIndex: 0, label: "Pre-shift", copy: "Course opens at 10:30 PM" };
      }

      function phaseKey(phase) {
        return `${phase.kind}-${phase.sceneIndex}-${phase.start ?? ""}-${phase.end ?? ""}`;
      }

      function updateIntermissionCountdown(phase) {
        const stopwatch = document.getElementById("break-stopwatch");
        const time = document.getElementById("countdown-time");
        const label = document.getElementById("countdown-label");
        const isTimedBreak = phase.kind === "break" || phase.kind === "lunch";
        stopwatch.hidden = !isTimedBreak;
        if (!isTimedBreak) return;

        time.textContent = formatCountdown(phase.remainingMs);
        label.textContent = phase.kind === "lunch" ? "Lunch Countdown" : "Break Countdown";
      }

      let renderedPhaseKey = "";
      let lastFullRenderAt = 0;

      function renderPhase(phase = phaseForNow()) {
        const scene = SCENES[phase.sceneIndex];
        document.querySelector(".stage").dataset.scene = scene.id;
        document.querySelector(".stage").style.setProperty("--route-main", scene.routeMain);
        document.querySelector(".stage").style.setProperty("--route-accent", scene.routeAccent);
        document.getElementById("route-shadow").setAttribute("points", scene.route);
        document.getElementById("route-main").setAttribute("points", scene.route);
        document.getElementById("lane-layer").innerHTML = laneLayerHtml(scene.route);
        document.getElementById("checkpoint-layer").innerHTML = scene.checkpoints.map(checkpointHtml).join("");
        document.getElementById("obstacle-layer").innerHTML = scene.obstacles.map(obstacleHtml).join("");
        document.getElementById("operator-layer").innerHTML = operatorLayerHtml(scene);
        document.getElementById("leaderboard-list").innerHTML = leaderboardHtml();
        const podiumMarkup = podiumHtml(podiumCourseIndexForPhase(phase));
        document.querySelector(".podium").hidden = !podiumMarkup;
        document.getElementById("podium-stands").innerHTML = podiumMarkup;
        document.getElementById("course-badge").textContent = scene.badge;

        const intermission = document.getElementById("intermission");
        const isIntermission = phase.kind === "break" || phase.kind === "lunch" || phase.kind === "pre" || phase.kind === "complete";
        intermission.hidden = !isIntermission;
        if (isIntermission) {
          document.getElementById("intermission-title").textContent = phase.label;
          document.getElementById("intermission-copy").textContent = phase.copy || scene.title;
        }
        updateIntermissionCountdown(phase);

        scheduleGeyserSpawns();
        renderedPhaseKey = phaseKey(phase);
        lastFullRenderAt = Date.now();
      }

      function refreshOverlay() {
        const phase = phaseForNow();
        const nextPhaseKey = phaseKey(phase);
        if (nextPhaseKey !== renderedPhaseKey || Date.now() - lastFullRenderAt >= API_CONFIG.refreshMs) {
          renderPhase(phase);
          return;
        }

        updateIntermissionCountdown(phase);
      }

      renderPhase();
      scheduleGlacierRumble();
      setInterval(refreshOverlay, 1000);
    </script>
  </body>
</html>
